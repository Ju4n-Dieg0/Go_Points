version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: go_points_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: go_points
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - go_points_network

  # Go Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go_points_app
    environment:
      APP_NAME: Go Points API
      APP_ENV: development
      LOG_LEVEL: info
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: go_points
      DB_SSLMODE: disable
      JWT_ACCESS_SECRET: dev-access-secret-key
      JWT_REFRESH_SECRET: dev-refresh-secret-key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - go_points_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  go_points_network:
    driver: bridge
